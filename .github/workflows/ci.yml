name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Full history for nbgv

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -r win-x64 -p:ContinuousIntegrationBuild=true

    - name: Test
      run: dotnet test --no-build -r win-x64 --verbosity normal
