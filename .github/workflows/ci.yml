name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Full history for nbgv

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.x

    - name: Restore
      run: dotnet restore

    - name: Build Extension
      # TODO: Switch to Release once we add a System.Text.Json source generator to fix IL2026/IL3050 trim+AOT warnings.
      # Currently Debug is used because Release enables PublishTrimmed + ILLinkTreatWarningsAsErrors, which promotes
      # the reflection-based JSON serialization warnings to errors.
      run: dotnet publish TodoPalExtension --no-restore -r win-x64 -c Debug -p:ContinuousIntegrationBuild=true

    - name: Build Tests
      run: dotnet build TodoPalExtension.Tests --no-restore -p:ContinuousIntegrationBuild=true

    - name: Test
      run: dotnet test TodoPalExtension.Tests --no-build --verbosity normal
